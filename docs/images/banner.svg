<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B9AAA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5CC8D7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B9AAA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow-fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A8DADC;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#5CC8D7;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" ry="12" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="0.5" fill="none">
    <line x1="0" y1="40" x2="900" y2="40" />
    <line x1="0" y1="80" x2="900" y2="80" />
    <line x1="0" y1="120" x2="900" y2="120" />
    <line x1="0" y1="160" x2="900" y2="160" />
    <line x1="100" y1="0" x2="100" y2="200" />
    <line x1="200" y1="0" x2="200" y2="200" />
    <line x1="300" y1="0" x2="300" y2="200" />
    <line x1="400" y1="0" x2="400" y2="200" />
    <line x1="500" y1="0" x2="500" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="700" y1="0" x2="700" y2="200" />
    <line x1="800" y1="0" x2="800" y2="200" />
  </g>

  <!-- Shield icon -->
  <g transform="translate(80, 100)">
    <!-- Shield body -->
    <path d="M0,-52 L30,-40 L30,-5 C30,22 15,42 0,52 C-15,42 -30,22 -30,-5 L-30,-40 Z"
          fill="url(#shield-fill)" opacity="0.95" />
    <!-- Shield outline -->
    <path d="M0,-52 L30,-40 L30,-5 C30,22 15,42 0,52 C-15,42 -30,22 -30,-5 L-30,-40 Z"
          fill="none" stroke="#A8DADC" stroke-width="1.5" opacity="0.6" />
    <!-- Checkmark inside shield -->
    <path d="M-12,2 L-4,12 L14,-10" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Dual-arrow icon (representing dual storage) -->
  <g transform="translate(145, 100)" opacity="0.7">
    <!-- Top arrow -->
    <path d="M0,-18 L18,-18 L18,-28 L34,-12 L18,4 L18,-6 L0,-6 Z" fill="url(#arrow-fill)" />
    <!-- Bottom arrow -->
    <path d="M34,18 L16,18 L16,28 L0,12 L16,-4 L16,6 L34,6 Z" fill="url(#arrow-fill)" />
  </g>

  <!-- Title text -->
  <text x="200" y="96" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">
    duplicacy-cli-cron
  </text>

  <!-- Subtitle -->
  <text x="200" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#A8DADC" letter-spacing="0.5">
    Automated encrypted backups to dual S3 destinations
  </text>

  <!-- Tag pills -->
  <g transform="translate(200, 148)">
    <rect x="0" y="0" width="62" height="22" rx="11" ry="11" fill="#FFFFFF" opacity="0.12" />
    <text x="31" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">Docker</text>

    <rect x="72" y="0" width="55" height="22" rx="11" ry="11" fill="#FFFFFF" opacity="0.12" />
    <text x="99.5" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">Alpine</text>

    <rect x="137" y="0" width="86" height="22" rx="11" ry="11" fill="#FFFFFF" opacity="0.12" />
    <text x="180" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">Multi-Arch</text>

    <rect x="233" y="0" width="88" height="22" rx="11" ry="11" fill="#FFFFFF" opacity="0.12" />
    <text x="277" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">AES-256-GCM</text>

    <rect x="331" y="0" width="40" height="22" rx="11" ry="11" fill="#FFFFFF" opacity="0.12" />
    <text x="351" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#A8DADC" text-anchor="middle">S3</text>
  </g>
</svg>
